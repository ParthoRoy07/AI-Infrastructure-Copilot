<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyze Infrastructure Logs - AI Infrastructure Copilot</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #6366f1;
            --accent-primary-hover: #4f46e5;
            --accent-secondary: #06b6d4;
            --glow-color: rgba(99, 102, 241, 0.15);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Decorative background glows */
        .bg-glow-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, rgba(99, 102, 241, 0) 70%);
            z-index: -1;
            filter: blur(80px);
        }

        /* Glassmorphic navbar */
        .navbar-custom {
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
        }

        .navbar-brand-custom {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .navbar-brand-custom:hover {
            color: #a5b4fc;
        }

        /* Page title */
        .page-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 2.25rem;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #ffffff 40%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        /* Glassmorphic form card */
        .glass-card {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* Custom form controls */
        .form-label-custom {
            font-weight: 600;
            color: #a5b4fc;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-control-custom {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            padding: 1rem;
            transition: all 0.3s ease;
        }

        .form-control-custom:focus {
            background: rgba(0, 0, 0, 0.3);
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            color: #ffffff;
        }

        .form-control-custom::placeholder {
            color: #475569;
        }

        /* Custom buttons */
        .btn-custom {
            padding: 0.8rem 2rem;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1rem;
            text-decoration: none;
            border: none;
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, var(--accent-primary) 0%, #4f46e5 100%);
            color: #ffffff;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
            cursor: pointer;
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
            color: #ffffff;
        }

        .btn-secondary-custom {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary-custom:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            transform: translateY(-2px);
        }

        .footer-text {
            color: #475569;
            font-size: 0.875rem;
            margin-top: auto;
            padding: 2rem 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="bg-glow-1"></div>

    <!-- Navigation -->
    <nav class="navbar navbar-custom navbar-dark mb-5">
        <div class="container">
            <a class="navbar-brand-custom" href="{{ url_for('home') }}">
                <i class="bi bi-cpu-fill text-indigo-400"></i>
                <span>AI Infrastructure Copilot</span>
            </a>
            <a href="{{ url_for('home') }}" class="btn-custom btn-secondary-custom py-2 px-3 text-sm">
                <i class="bi bi-arrow-left"></i> Back to Home
            </a>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container py-3">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="mb-4">
                    <h1 class="page-title">Analyze Infrastructure Logs</h1>
                    <p class="text-secondary">Paste system or application log entries below to diagnose errors, identify root causes, and suggest resolutions using AI.</p>
                </div>

                <div class="glass-card">
                    <form action="{{ url_for('upload') }}" method="POST">
                        <div class="mb-4">
                            <label for="log_text" class="form-label-custom">
                                <i class="bi bi-terminal-fill"></i> Paste Infrastructure Logs
                            </label>
                            <textarea 
                                class="form-control form-control-custom" 
                                id="log_text" 
                                name="log_text" 
                                rows="12" 
                                placeholder="[2026-06-19 23:45:12] ERROR: Database connection failed&#10;[2026-06-19 23:45:15] CRITICAL: Connection refused on port 5432..."
                                required></textarea>
                        </div>

                        <div class="d-flex justify-content-between align-items-center">
                            <span class="text-secondary opacity-75 small">
                                <i class="bi bi-info-circle me-1"></i> Supports server, DB, application, and cloud logs
                            </span>
                            <button type="submit" class="btn-custom btn-primary-custom">
                                <i class="bi bi-lightning-charge-fill"></i>
                                Analyze Logs
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer-text">
        Powered by advanced AI Agents &bull; Secure &amp; Automated
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
